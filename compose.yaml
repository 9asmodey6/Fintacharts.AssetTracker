services:
  postgres:
    image: postgres:16
    container_name: asset-tracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: asset_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d asset_tracker" ]
      interval: 5s
      timeout: 5s
      retries: 5
  
  api:
    build:
      context: .
      dockerfile: Fintacharts.AssetTracker/Dockerfile
    container_name: asset-tracker
    depends_on:
      postgres:
        condition: service_healthy
    environment:
       - ASPNETCORE_ENVIRONMENT=Development
       - ConnectionStrings__Default=${FINTA_DB_CONNECTION}
       - Fintacharts__BaseUrl=${FINTA_BASE_URL}
       - Fintacharts__WssUrl=${FINTA_WSS_URL}
       - Fintacharts__Username=${FINTA_USER}
       - Fintacharts__Password=${FINTA_PASS}
       - Fintacharts__Realm=${FINTA_REALM}
       - Fintacharts__ClientId=${FINTA_CLIENT_ID}
    ports:
      - "8080:8080"

  web:
    build:
      context: ./Fintacharts.AssetTracker.Web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
    container_name: asset-tracker-web
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  postgres-data:

